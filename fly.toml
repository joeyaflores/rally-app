app = "mas-millas"
primary_region = "dfw"

[build]
  [build.args]
    NEXT_PUBLIC_URL = "https://mas-millas.fly.dev"

[env]
BETTER_AUTH_URL = "https://mas-millas.fly.dev"
NEXT_PUBLIC_URL = "https://mas-millas.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "15s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/api/healthz"

[mounts]
  source = "data"
  destination = "/data"
